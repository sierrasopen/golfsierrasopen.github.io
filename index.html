<!DOCTYPE html>
<html lang="es">
<meta property="og:title" content="Sierras Open Golf Tour 2026">

<title>Sierras Open Golf Tour 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #0D3B2D;
    --dorado: #B8960C;
    --dorado2: #D4AF37;
    --crema: #F5F0E8;
    --linea: rgba(184,150,12,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--verde);
    font-family: 'Raleway', sans-serif;
    color: var(--crema);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  body::before {
    content: ''; position: fixed;
    top: -80px; right: -80px; width: 320px; height: 320px;
    border: 1px solid rgba(184,150,12,0.15); border-radius: 50%; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed;
    top: -40px; right: -40px; width: 200px; height: 200px;
    border: 1px solid rgba(184,150,12,0.1); border-radius: 50%; pointer-events: none;
  }
  .wrapper { width: 100%; max-width: 520px; position: relative; z-index: 1; }

  .header { border-bottom: 1px solid var(--linea); padding-bottom: 36px; margin-bottom: 36px; }

  .aniversario {
    font-family: 'Raleway', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.4em;
    color: var(--dorado); text-transform: uppercase;
    margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
  }
  .aniversario::before { content: ''; display: inline-block; width: 30px; height: 1px; background: var(--dorado); }

  .titulo-principal { font-family: 'Libre Baskerville', serif; font-size: 52px; font-weight: 400; line-height: 1; color: var(--crema); }
  .titulo-principal strong { font-weight: 700; color: var(--dorado2); display: block; font-style: italic; }

  .links { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }

  .link-btn {
    display: flex; align-items: center; gap: 18px;
    padding: 22px 26px; text-decoration: none;
    border: 1px solid rgba(245,240,232,0.1);
    background: rgba(245,240,232,0.04);
    color: var(--crema); position: relative; overflow: hidden;
    transition: all 0.22s ease;
  }
  .link-btn::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--dorado); transform: scaleY(0);
    transition: transform 0.2s ease; transform-origin: bottom;
  }
  .link-btn:hover { background: rgba(245,240,232,0.08); border-color: rgba(184,150,12,0.35); transform: translateX(4px); }
  .link-btn:hover::before { transform: scaleY(1); }
  .link-btn.destacado { background: rgba(184,150,12,0.08); border-color: rgba(184,150,12,0.3); }

  .link-icono {
    width: 44px; height: 44px;
    background: rgba(245,240,232,0.06); border: 1px solid rgba(184,150,12,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .link-btn.destacado .link-icono { background: rgba(184,150,12,0.15); border-color: rgba(184,150,12,0.45); }

  .link-texto { flex: 1; }
  .link-titulo { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 700; color: var(--crema); line-height: 1.2; }
  .link-btn.destacado .link-titulo { color: var(--dorado2); }
  .link-desc { font-family: 'Raleway', sans-serif; font-size: 12px; font-weight: 400; letter-spacing: 0.1em; color: rgba(245,240,232,0.45); margin-top: 3px; text-transform: uppercase; }

  .link-flecha { font-family: 'Libre Baskerville', serif; font-size: 18px; color: var(--dorado); opacity: 0; transform: translateX(-6px); transition: all 0.2s ease; }
  .link-btn:hover .link-flecha { opacity: 1; transform: translateX(0); }

  .footer { border-top: 1px solid var(--linea); padding-top: 24px; display: flex; align-items: center; justify-content: space-between; }
  .footer-brand { font-family: 'Libre Baskerville', serif; font-size: 15px; font-weight: 700; font-style: italic; color: var(--dorado); }
  .footer-datos { font-family: 'Raleway', sans-serif; font-size: 11px; color: rgba(245,240,232,0.35); letter-spacing: 0.1em; text-align: right; line-height: 1.8; }

  @media (max-width: 500px) {
    .titulo-principal { font-size: 38px; }
    .link-btn { padding: 18px 20px; }
    .footer { flex-direction: column; gap: 14px; text-align: center; }
    .footer-datos { text-align: center; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="aniversario">20° Aniversario · 2026</div>
    <div class="titulo-principal">
      Sierras Open
      <strong>Golf Tour</strong>
    </div>
  </div>

  <div class="links">

    <a class="link-btn destacado" href="https://chat.whatsapp.com/Ck8Yo8tqx578V69XysROxo?mode=gi_t" target="_blank">
      <div class="link-icono">📣</div>
      <div class="link-texto">
        <div class="link-titulo">Canal de WhatsApp</div>
        <div class="link-desc">Novedades · Fechas · Descuentos exclusivos</div>
      </div>
      <div class="link-flecha">→</div>
    </a>

    <a class="link-btn" href="reglamento.html" target="_blank">
      <div class="link-icono">📋</div>
      <div class="link-texto">
        <div class="link-titulo">Reglamento 2026</div>
        <div class="link-desc">Sistema de juego · Premios · Cronograma</div>
      </div>
      <div class="link-flecha">→</div>
    </a>



  </div>

  <div class="footer">
    <div class="footer-brand">Sierras Open Golf Tour 2026</div>
    <div class="footer-datos">
      @golfsierrasopen<br>
      +54 351 516 5220 · Córdoba, Argentina
    </div>
  </div>

</div>
</body>
</html>
